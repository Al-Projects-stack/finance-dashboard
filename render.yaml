services:
  - type: web
    name: finance-dashboard
    runtime: node
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci
    startCommand: cd server && node index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: finance-db
    plan: free
    databaseName: finance_dashboard
    user: finance_user
