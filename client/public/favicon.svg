<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a38"/>
      <stop offset="100%" stop-color="#09061a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#mark)" stroke-width="0.9" stroke-opacity="0.38"/>

  <!-- Logo mark: three stacked layers (matches IconBrandLogo) -->
  <!-- Top layer — solid diamond -->
  <path d="M16 5.5 L7 10 L16 14.5 L25 10 Z"
    fill="url(#mark)" filter="url(#glow)"/>
  <!-- Middle layer -->
  <path d="M7 16 L16 20.5 L25 16"
    fill="none" stroke="url(#mark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.62"/>
  <!-- Bottom layer -->
  <path d="M7 21.5 L16 26 L25 21.5"
    fill="none" stroke="url(#mark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.3"/>
</svg>
